<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>PiNNTORP</title>
    <link rel="icon" type="image/png" href="resources/images/icon.png">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header class="site-header">
        <div>
            <button type="button" class="hamburger-btn" id="nav-open" aria-label="Open menu">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
            </button>
            <a href="index.html" class="site-logo-link">
                <img class="site-icon" src="resources/images/icon.png" alt="PiNNTORP icon">
                <h1>PiNNTORP</h1>
            </a>
        </div>
        <div class="header-meta">
            <div class="balance-chip">Balance: <span id="balance-value">$0</span></div>
        </div>
    </header>

    <main class="layout">
        <div class="column">
            <section>
                <h2>Friends</h2>
                <form id="friend-form" class="friend-search-form">
                    <input id="friend-name" type="text" placeholder="Username" required>
                    <button type="submit">Send Request</button>
                </form>
                <p id="friend-status" class="friend-status"></p>
                <ul id="friends-list"></ul>
            </section>
        </div>

        <div class="column">
            <section id="friend-requests-section" class="hidden">
                <h2>Requests</h2>
                <div class="request-group">
                    <h3 class="request-group-label">Received</h3>
                    <ul id="received-requests-list"></ul>
                </div>
                <div class="request-group">
                    <h3 class="request-group-label">Sent</h3>
                    <ul id="sent-requests-list"></ul>
                </div>
            </section>
            <section>
                <h2>How It Works</h2>
                <p>Add friends by username to connect their favorite games with your recommendation feed.</p>
                <p id="friend-offline-note" class="friend-status">Log in to send friend requests and sync with other players.</p>
            </section>
        </div>
    </main>

    <script type="module" src="js/app.js"></script>
</body>
</html>
