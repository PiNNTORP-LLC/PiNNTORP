<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>PiNNTORP</title>
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header class="site-header">
        <div>
            <h1>PiNNTORP</h1>
            <nav class="tab-nav" aria-label="Primary">
                <a class="tab-link" href="index.html">Home</a>
                <a class="tab-link" href="games.html">Games</a>
                <a class="tab-link is-active" href="friends.html">Friends</a>
                <a class="tab-link" href="profile.html">Profile</a>
            </nav>
        </div>
        <div class="header-meta">
            <div class="balance-chip">Balance: <span id="balance-value">$0</span></div>
            <img class="site-icon" src="icon.png" alt="PiNNTORP icon">
        </div>
    </header>

    <main class="layout">
        <div class="column">
            <section>
                <h2>Friends</h2>
                <form id="friend-form">
                    <input id="friend-name" type="text" placeholder="Friend name" required>
                    <button type="submit">Add</button>
                </form>
                <ul id="friends-list"></ul>
            </section>
        </div>

        <div class="column">
            <section>
                <h2>How It Works</h2>
                <p>Add friends by username to connect their favorite games with your recommendation feed.</p>
            </section>
        </div>
    </main>

    <section class="full-width-section">
        <h2>Recommended Games</h2>
        <div id="rec-list" class="rec-list" aria-live="polite"></div>
    </section>

    <script type="module" src="js/app.js"></script>
</body>
</html>
