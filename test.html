<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Integration Example</title>
        <style>
            .box
            {
                border: 1px solid black;
            }
        </style>
    </head>
    <body>
        <div class="box">
            <h3>/login</h3>
            <form>
                <fieldset>
                    <legend>Login:</legend>
                    <label for="username">Username:</label><br>
                    <input type="text" id="username" name="username"><br>
                    <label for="password">Password:</label><br>
                    <input type="password" id="password" name="password"><br>
                    <label for="actionLogin">Action:</label><br>
                    <select id="actionLogin" name="action">
                        <option value="login">Login</option>
                        <option value="register">Register</option>
                        <option value="logout">Logout</option>
                    </select><br>
                    <button id="submitLoginRegister">Submit</button>
                </fieldset>
            </form>
            <h5>Response</h5>
            <div class="box" id="responseLoginRegister">
            </div>
        </div>
        <div class="box">
            <h3>/user</h3>
            <form>
                <fieldset>
                    <legend>User:</legend>
                    <label></label>
                </fieldset>
            </form>
        </div>
        <div class="box">
            <h3>/friends</h3>
            <form>
                <fieldset>
                    <legend>Friends:</legend>
                    <label for="sidFriends">Session ID:</label><br>
                    <input type="text" id="sidFriends" name="sessionID"><br>
                    <label for="pidFriends">Player ID:</label><br>
                    <input type="number" id="pidFriends" name="playerID"><br>
                    <label for="friendID">Friend ID:</label><br>
                    <input type="number" id="friendID" name="friendID"><br>
                    <label for="actionFriends">Action:</label><br>
                    <select id="actionFriends" name="action">
                        <option value="add">Add friend</option>
                        <option value="remove">Remove friend</option>
                        <option value="list-friends">List friends</option>
                        <option value="accept">Accept friend request</option>
                        <option value="decline">Decline friend request</option>
                        <option value="cancel">Cancel friend request</option>
                        <option value="list-requests">List friend requests</option>
                    </select>
                </fieldset>
            </form>
            <h5>Response</h5>
            <div class="box" id="responseFriends">
            </div>
        </div>
        <div class="box">
            <h3>/lobby</h3>
            <form>
                <fieldset>
                    <legend>Lobbies:</legend>
                    <label for="sidLobby">Session ID:</label><br>
                    <input type="text" id="sidLobby" name="sessionID"><br>
                    <label for="pidLobby">Player ID:</label><br>
                    <input type="number" id="pidLobby" name="playerID"><br>
                    <label for="lobbyID">Lobby ID:</label><br>
                    <input type="text" id="lobbyID" name="lobbyID"><br>
                    <label for="actionLobby">Action:</label><br>
                    <select id="actionLobby" name="action">
                        <option value="create">Create</option>
                        <option value="list">List</option>
                        <option value="join">Join</option>
                        <option value="leave">Leave</option>
                    </select>
                </fieldset>
            </form>
            <h5>Response</h5>
            <div class="box" id="responseLobby">
            </div>
        </div>
    </body>
</html>
