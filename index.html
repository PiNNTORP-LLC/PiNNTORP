<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>PiNNTORP</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <h1>PiNNTORP</h1>

    <main class="layout">
        <div class="column">
            <section>
                <h2>Friends</h2>
                <form id="friend-form">
                    <input id="friend-name" type="text" placeholder="Friend name" required>
                    <button type="submit">Add</button>
                </form>
                <ul id="friends-list"></ul>
            </section>

            <section>
                <h2>Recommended Games</h2>
                <p id="rec-list"></p>
            </section>

            <section>
                <h2>Stats</h2>
                <div id="stats-view"></div>
                <button id="reset-stats" type="button">Reset</button>
            </section>
        </div>

        <div class="column">
            <section>
                <a href="games.html">
                    <button>Games</button>
                </a>
            </section>
        </div>
    </main>

    <script type="module" src="js/app.js"></script>
</body>
</html>
