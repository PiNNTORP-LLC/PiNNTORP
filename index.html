<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>PiNNTORP</title>
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
</head>

<body>
    <div id="auth-view">
        <h1>PiNNTORP</h1>
        <div id="auth-section" class="auth-wrapper">
            <div id="login-container" class="auth-panel">
                <section>
                    <h2>Login</h2>
                    <form id="login-form">
                        <input name="username" type="text" placeholder="Username" required>
                        <input name="password" type="password" placeholder="Password" required>
                        <button type="submit">Log In</button>
                        <p class="auth-toggle">
                            Don't have an account? <button type="button" id="go-to-signup" class="link-btn">Sign
                                Up</button>
                        </p>
                    </form>
                </section>
            </div>
            <div id="register-container" class="auth-panel auth-panel-hidden">
                <section>
                    <h2>Register</h2>
                    <form id="register-form">
                        <input name="username" type="text" placeholder="Username" required>
                        <input name="password" type="password" placeholder="Password" required>
                        <button type="submit">Sign Up</button>
                        <p class="auth-toggle">
                            Already have an account? <button type="button" id="go-to-login" class="link-btn">Log
                                In</button>
                        </p>
                    </form>
                </section>
            </div>
            <div class="auth-message-wrapper">
                <p id="auth-message" style="color: #ef4444; font-weight: 600; text-align: center;"></p>
            </div>
        </div>
    </div>

    <div id="app-section" class="hidden app-container">
        <header class="app-header">
            <h1 style="margin: 0; font-size: 2rem;">PiNNTORP</h1>
            <div style="display: flex; align-items: center; gap: 1.5rem;">
                <span style="font-size: 1.05rem; color: #4b5563;">Logged in as: <strong id="logged-in-user"
                        style="color: #3b82f6;"></strong></span>
                <button id="logout-btn" type="button"
                    style="background-color: #ef4444; padding: 0.5rem 1rem;">Logout</button>
            </div>
        </header>

        <div class="app-body">
            <aside class="sidebar-nav">
                <nav class="nav-menu">
                    <button class="nav-btn active" data-view="games-view">
                        <span class="nav-icon">🎮</span> Games
                    </button>
                    <button class="nav-btn" data-view="profile-view">
                        <span class="nav-icon">👤</span> Profile
                    </button>
                </nav>
            </aside>

            <main class="main-content">
                <!-- GAMES VIEW -->
                <div id="games-view" class="app-view">
                    <div class="tabs-container">
                        <button class="tab-btn active" data-tab="slots-tab">Slots</button>
                        <button class="tab-btn" data-tab="dice-tab">Dice Roll</button>
                    </div>

                    <section id="slots-tab" class="slots game-panel">
                        <h2>Slots</h2>
                        <div class="slot-row">
                            <div class="slot-nums">
                                <h3 id="first-num">One</h3>
                            </div>
                            <div class="slot-nums">
                                <h3 id="second-num">Two</h3>
                            </div>
                            <div class="slot-nums">
                                <h3 id="third-num">Three</h3>
                            </div>
                        </div>
                        <button id="slot-roll" type="button">Roll</button>
                    </section>

                    <section id="dice-tab" class="game-panel hidden">
                        <h2>Dice Roll</h2>
                        <p>Pick a number 1-6.</p>
                        <div id="game-controls"></div>
                        <p id="game-result">No games played yet.</p>
                    </section>
                </div>

                <!-- PROFILE VIEW -->
                <div id="profile-view" class="app-view hidden">
                    <section class="profile-section">
                        <h2>Profile</h2>

                        <div style="margin-bottom: 2rem;">
                            <h3 class="subsection-title">Stats</h3>
                            <div id="stats-view"></div>
                            <button id="reset-stats" type="button" class="secondary-btn"
                                style="margin-top: 0.75rem;">Reset Stats</button>
                        </div>

                        <div>
                            <h3 class="subsection-title">Friends</h3>
                            <form id="friend-form" class="friend-form" style="display: flex; gap: 0.5rem;">
                                <input id="friend-name" type="text" placeholder="Friend name" required style="flex: 1;">
                                <button type="submit">Add</button>
                            </form>
                            <ul id="friends-list"></ul>
                        </div>
                    </section>
                </div>
            </main>
        </div>
    </div>

    <script type="module" src="js/app.js"></script>
</body>

</html>
