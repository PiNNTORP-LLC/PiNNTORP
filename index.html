<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>PiNNTORP</title>
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <div id="auth-view">
        <h1>PiNNTORP</h1>
        <div id="auth-section" class="auth-wrapper">
            <div id="login-container" class="auth-panel">
                <section>
                    <h2>Login</h2>
                    <form id="login-form">
                        <input name="username" type="text" placeholder="Username" required>
                        <input name="password" type="password" placeholder="Password" required>
                        <button type="submit">Log In</button>
                        <p class="auth-toggle">
                            Don't have an account? <button type="button" id="go-to-signup" class="link-btn">Sign
                                Up</button>
                        </p>
                    </form>
                </section>
            </div>
            <div id="register-container" class="auth-panel auth-panel-hidden">
                <section>
                    <h2>Register</h2>
                    <form id="register-form">
                        <input name="username" type="text" placeholder="Username" required>
                        <input name="password" type="password" placeholder="Password" required>
                        <button type="submit">Sign Up</button>
                        <p class="auth-toggle">
                            Already have an account? <button type="button" id="go-to-login" class="link-btn">Log
                                In</button>
                        </p>
                    </form>
                </section>
            </div>
            <div class="auth-message-wrapper">
                <p id="auth-message" style="color: #ef4444; font-weight: 600; text-align: center;"></p>
            </div>
        </div>
    </div>

    <div id="app-section" class="hidden"
        style="width: 100%; max-width: 1000px; display: flex; flex-direction: column; gap: 2rem;">
        <header
            style="display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #e5e7eb; padding-bottom: 1rem;">
            <h1 style="margin: 0; font-size: 2rem;">PiNNTORP</h1>
            <div style="display: flex; align-items: center; gap: 1.5rem;">
                <span style="font-size: 1.05rem; color: #4b5563;">Logged in as: <strong id="logged-in-user"
                        style="color: #3b82f6;"></strong></span>
                <button id="logout-btn" type="button"
                    style="background-color: #ef4444; padding: 0.5rem 1rem;">Logout</button>
            </div>
        </header>

        <main class="layout">
            <div class="column">
                <section>
                    <h2>Friends</h2>
                    <form id="friend-form">
                        <input id="friend-name" type="text" placeholder="Friend name" required>
                        <button type="submit">Add</button>
                    </form>
                    <ul id="friends-list"></ul>
                </section>

                <section>
                    <h2>Stats</h2>
                    <div id="stats-view"></div>
                    <button id="reset-stats" type="button">Reset</button>
                </section>
            </div>

            <div class="column">
                <div class="tabs-container">
                    <button class="tab-btn active" data-tab="slots-tab">Slots</button>
                    <button class="tab-btn" data-tab="dice-tab">Dice Roll</button>
                </div>

                <section id="slots-tab" class="slots game-panel">
                    <h2>Slots</h2>
                    <div class="slot-row">
                        <div class="slot-nums">
                            <h3 id="first-num">One</h3>
                        </div>
                        <div class="slot-nums">
                            <h3 id="second-num">Two</h3>
                        </div>
                        <div class="slot-nums">
                            <h3 id="third-num">Three</h3>
                        </div>
                    </div>
                    <button id="slot-roll" type="button">Roll</button>
                </section>

                <section id="dice-tab" class="game-panel hidden">
                    <h2>Dice Roll</h2>
                    <p>Pick a number 1-6.</p>
                    <div id="game-controls"></div>
                    <p id="game-result">No games played yet.</p>
                </section>
            </div>
        </main>
    </div>

    <script type="module" src="js/app.js"></script>
</body>

</html>
