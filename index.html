<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>PiNNTORP</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <h1>PiNNTORP</h1>

    <main class="layout">
        <div class="column">
            <section>
                <h2>Friends</h2>
                <form id="friend-form">
                    <input id="friend-name" type="text" placeholder="Friend name" required>
                    <button type="submit">Add</button>
                </form>
                <ul id="friends-list"></ul>
            </section>

            <section>
                <h2>Stats</h2>
                <div id="stats-view"></div>
                <button id="reset-stats" type="button">Reset</button>
            </section>
        </div>

        <div class="column">
            <section class="slots">
                <h2>Slots</h2>
                <div class="slot-row">
                    <div class="slot-nums">
                        <h3 id="first-num">One</h3> 
                    </div>
                    <div class="slot-nums">
                        <h3 id="second-num">Two</h3>
                    </div>
                    <div class="slot-nums">
                        <h3 id="third-num">Three</h3>
                    </div>
                </div>
                <button id="slot-roll" type="button">Roll</button>
            </section>

            <section>
                <h2>Dice Roll</h2>
                <p>Pick a number 1-6.</p>
                <div id="game-controls"></div>
                <p id="game-result">No games played yet.</p>
            </section>
        </div>
    </main>

    <script type="module" src="js/app.js"></script>
</body>
</html>
