<html>
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>PiNNTORP</title>
        <link rel="stylesheet" href="css/styles.css">
    </head>
    <body>
        <h1>PiNNTORP</h1>


        <main class="layout">
            <div class="column">
                <section>
                    <h2>Recommended Games</h2>
                    <p id="rec-list"></p>
                </section>

                <section>
                    <h2>Stats</h2>
                    <div id="stats-view"></div>
                    <button id="reset-stats" type="button">Reset</button>
                </section>

                <section>
                    <a href="index.html">
                        <button>Main Menu</button>
                    </a>
                </section>
            </div>

            <div class="column">
                <section class="slots">
                    <h2>Slots</h2>
                    <div class="slot-row">
                        <div class="slot-nums">
                            <h3 id="first-num">One</h3> 
                        </div>
                        <div class="slot-nums">
                            <h3 id="second-num">Two</h3>
                        </div>
                        <div class="slot-nums">
                            <h3 id="third-num">Three</h3>
                        </div>
                    </div>
                    <button id="slot-roll" type="button">Roll</button>
                </section>

                <section>
                    <h2>Dice Roll</h2>
                    <p>Pick a number 1-6.</p>
                    <div id="game-controls"></div>
                    <p id="game-result">No games played yet.</p>
                </section>

                <section>
                    <h2>Coin Flip</h2>
                    <p>Heads or Tails?</p>
                    <p id="coinResult">No games played yet</p>
                    <p id="choice"></p>
                    <button type="button" id="heads">Heads</button>
                    <button type="button" id="tails">Tails</button>
                </section>
            </div>
        </main>

        <script type="module" src="js/app.js"></script>
    </body>
</html>
