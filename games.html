<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>PiNNTORP</title>
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header class="site-header">
        <div>
            <h1>PiNNTORP</h1>
            <nav class="tab-nav" aria-label="Primary">
                <a class="tab-link" href="index.html">Home</a>
                <a class="tab-link is-active" href="games.html">Games</a>
                <a class="tab-link" href="friends.html">Friends</a>
                <a class="tab-link" href="profile.html">Profile</a>
            </nav>
        </div>
        <div class="header-meta">
            <div class="balance-chip">Balance: <span id="balance-value">$0</span></div>
            <img class="site-icon" src="icon.png" alt="PiNNTORP icon">
        </div>
    </header>

    <main class="layout">
        <div class="column">
            <section>
                <h2>Games</h2>
                <p>Pick any game below to play. Recommendation cards can also jump you straight here.</p>
            </section>
        </div>

        <div class="column">
            <section id="slots-game" class="slots game-panel">
                <h2>Slots</h2>
                <div class="slot-row">
                    <div class="slot-nums">
                        <h3 id="first-num">One</h3> 
                    </div>
                    <div class="slot-nums">
                        <h3 id="second-num">Two</h3>
                    </div>
                    <div class="slot-nums">
                        <h3 id="third-num">Three</h3>
                    </div>
                </div>
                <button id="slot-roll" type="button">Roll</button>
            </section>

            <section id="dice-game" class="game-panel">
                <h2>Dice Roll</h2>
                <p>Pick a number 1-6.</p>
                <div id="game-controls"></div>
                <p id="game-result">No games played yet.</p>
            </section>

            <section id="coin-flip-game" class="game-panel">
                <h2>Coin Flip</h2>
                <p>Heads or Tails?</p>
                <p id="coinResult">No games played yet</p>
                <p id="choice"></p>
                <button type="button" id="heads">Heads</button>
                <button type="button" id="tails">Tails</button>
            </section>
        </div>
    </main>

    <section class="full-width-section">
        <h2>Recommended Games</h2>
        <div id="rec-list" class="rec-list" aria-live="polite"></div>
    </section>

    <script type="module" src="js/app.js"></script>
</body>
</html>
