<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>PiNNTORP – Sign In</title>
    <link rel="icon" type="image/png" href="resources/images/icon.png">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="login-page">
    <header class="site-header">
        <div>
            <a href="index.html" class="site-logo-link">
                <img class="site-icon" src="resources/images/icon.png" alt="PiNNTORP icon">
                <h1>PiNNTORP</h1>
            </a>
        </div>
        <div class="header-meta"></div>
    </header>

    <main class="login-page-main">
        <section id="auth-panel" class="auth-panel">
            <div id="login-container" class="auth-form-wrap">
                <h2 class="auth-title">Welcome Back</h2>
                <form id="login-form" class="auth-form">
                    <input name="username" type="text" placeholder="Username" required class="auth-input">
                    <input name="password" type="password" placeholder="Password" required class="auth-input">
                    <button type="submit" class="auth-submit-btn">Log In</button>
                </form>
                <p class="auth-toggle">No account? <button type="button" id="go-to-signup" class="auth-link-btn">Sign Up</button></p>
            </div>
            <div id="register-container" class="auth-form-wrap auth-panel-hidden">
                <h2 class="auth-title">Create Account</h2>
                <form id="register-form" class="auth-form">
                    <input name="username" type="text" placeholder="Username" required class="auth-input" id="reg-username-input">
                    <p id="reg-username-error" class="auth-field-error">Username already taken!</p>
                    <input name="password" type="password" placeholder="Password" required class="auth-input">
                    <button type="submit" class="auth-submit-btn">Sign Up</button>
                </form>
                <p class="auth-toggle">Have an account? <button type="button" id="go-to-login" class="auth-link-btn">Log In</button></p>
            </div>
            <p id="auth-message" class="auth-message"></p>
        </section>
    </main>

    <script type="module" src="js/login.js"></script>
</body>
</html>
