<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>PiNNTORP</title>
    <link rel="icon" type="image/png" href="resources/images/icon.png">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header class="site-header">
        <div>
            <button type="button" class="hamburger-btn" id="nav-open" aria-label="Open menu">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
            </button>
            <a href="index.html" class="site-logo-link">
                <img class="site-icon" src="resources/images/icon.png" alt="PiNNTORP icon">
                <h1>PiNNTORP</h1>
            </a>
        </div>
        <div class="header-meta">
            <div class="balance-chip">Balance: <span id="balance-value">$0</span></div>
        </div>
    </header>

    <main>
        <div class="layout">
            <div class="column">
                <section>
                    <h2>Profile</h2>
                    <p>Your current play history and performance are tracked below.</p>
                </section>
            </div>

            <div class="column">
                <section>
                    <h2>Stats</h2>
                    <div id="stats-view"></div>
                    <button id="reset-stats" type="button">Reset</button>
                </section>

                <section class="danger-zone">
                    <h2>Delete My Account</h2>
                    <p>This permanently removes your account data. You will be asked to confirm before anything happens.</p>
                    <button id="delete-account-btn" type="button" class="danger-btn">Delete My Account</button>
                    <p id="delete-account-message" class="danger-message" aria-live="polite"></p>
                </section>
            </div>
        </div>

        <section class="history-section">
            <h2>Game History</h2>
            <div id="history-list" class="history-list"></div>
        </section>
    </main>

    <script type="module" src="js/app.js"></script>
</body>
</html>
